<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <!-- Browser frame -->
  <rect width="900" height="520" rx="10" fill="#f5f5f5"/>
  <rect width="900" height="38" rx="10" fill="#e8e8e8"/>
  <rect y="28" width="900" height="10" fill="#e8e8e8"/>
  <circle cx="22" cy="19" r="6" fill="#fc5f57"/>
  <circle cx="42" cy="19" r="6" fill="#fdbd2e"/>
  <circle cx="62" cy="19" r="6" fill="#27c840"/>
  <rect x="120" y="8" width="500" height="22" rx="4" fill="#fff"/>
  <text x="370" y="23" text-anchor="middle" font-size="12" fill="#888">app.onepaywall.com/gates</text>

  <!-- Sidebar -->
  <rect x="0" y="38" width="200" height="482" fill="#fafafa" stroke="#ebebeb"/>
  <text x="24" y="74" font-size="13" font-weight="600" fill="#111">OnePaywall</text>

  <rect x="16" y="86" width="168" height="30" rx="5" fill="#e0f4f4"/>
  <text x="32" y="106" font-size="12" fill="#17a2a4">Gates</text>

  <text x="32" y="140" font-size="12" fill="#888">Pricing</text>
  <text x="32" y="165" font-size="12" fill="#888">Subscribers</text>
  <text x="32" y="190" font-size="12" fill="#888">Advertising</text>
  <text x="32" y="215" font-size="12" fill="#888">Analytics</text>
  <text x="32" y="240" font-size="12" fill="#888">Email</text>
  <text x="32" y="265" font-size="12" fill="#888">Settings</text>

  <!-- Main panel -->
  <rect x="200" y="38" width="700" height="482" fill="#fff"/>

  <!-- Page header -->
  <text x="228" y="78" font-size="18" font-weight="600" fill="#111">Gates</text>
  <text x="228" y="98" font-size="13" fill="#888">Configure paywall gates and the step sequences readers see.</text>
  <rect x="780" y="58" width="108" height="32" rx="5" fill="#111"/>
  <text x="834" y="78" text-anchor="middle" font-size="12" fill="#fff">+ Create gate</text>

  <!-- Create Gate Sheet (right side panel overlay) -->
  <rect x="520" y="38" width="380" height="482" fill="#fff" stroke="#e5e5e5"/>
  <text x="544" y="82" font-size="16" font-weight="600" fill="#111">Create gate</text>

  <!-- Form fields -->
  <text x="544" y="116" font-size="12" font-weight="500" fill="#444">Gate name</text>
  <rect x="544" y="122" width="332" height="36" rx="5" stroke="#d0d0d0" fill="#fff"/>
  <text x="560" y="144" font-size="12" fill="#aaa">Premium content gate</text>

  <text x="544" y="178" font-size="12" font-weight="500" fill="#444">Domain</text>
  <rect x="544" y="184" width="332" height="36" rx="5" stroke="#d0d0d0" fill="#fff"/>
  <text x="560" y="206" font-size="12" fill="#111">myblog.com</text>
  <text x="860" y="206" text-anchor="end" font-size="12" fill="#888">▾</text>

  <text x="544" y="240" font-size="12" font-weight="500" fill="#444">URL pattern (triggers gate when matched)</text>
  <rect x="544" y="246" width="332" height="36" rx="5" stroke="#d0d0d0" fill="#fff"/>
  <text x="560" y="268" font-size="12" fill="#aaa">/article/**</text>

  <text x="544" y="302" font-size="12" font-weight="500" fill="#444">Steps</text>
  <text x="544" y="318" font-size="11" fill="#888">What readers see when the gate triggers</text>

  <!-- Step 1 -->
  <rect x="544" y="326" width="332" height="52" rx="6" fill="#f9f9f9" stroke="#e5e5e5"/>
  <rect x="560" y="338" width="24" height="24" rx="4" fill="#e0f4f4"/>
  <text x="572" y="354" text-anchor="middle" font-size="11" fill="#17a2a4">1</text>
  <text x="598" y="348" font-size="12" font-weight="500" fill="#111">Subscription prompt</text>
  <text x="598" y="366" font-size="11" fill="#888">Show plans — $4/mo or $36/yr</text>
  <text x="864" y="355" text-anchor="end" font-size="18" fill="#ccc">⋮</text>

  <!-- Step 2 -->
  <rect x="544" y="386" width="332" height="52" rx="6" fill="#f9f9f9" stroke="#e5e5e5"/>
  <rect x="560" y="398" width="24" height="24" rx="4" fill="#fff4e0"/>
  <text x="572" y="414" text-anchor="middle" font-size="11" fill="#e09000">2</text>
  <text x="598" y="408" font-size="12" font-weight="500" fill="#111">Ad interstitial</text>
  <text x="598" y="426" font-size="11" fill="#888">Show 15-sec ad, then unlock</text>
  <text x="864" y="415" text-anchor="end" font-size="18" fill="#ccc">⋮</text>

  <!-- Add step button -->
  <rect x="544" y="446" width="332" height="32" rx="5" stroke="#d0d0d0" fill="#fff" stroke-dasharray="4 2"/>
  <text x="710" y="466" text-anchor="middle" font-size="12" fill="#888">+ Add step</text>

  <!-- Save button -->
  <rect x="624" y="490" width="252" height="34" rx="5" fill="#111"/>
  <text x="750" y="511" text-anchor="middle" font-size="13" fill="#fff">Save gate</text>
</svg>
