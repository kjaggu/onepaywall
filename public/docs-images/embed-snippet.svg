<svg width="900" height="480" viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono', 'Fira Code', monospace">
  <!-- Browser frame -->
  <rect width="900" height="480" rx="10" fill="#f5f5f5"/>
  <!-- Titlebar -->
  <rect width="900" height="38" rx="10" fill="#e8e8e8"/>
  <rect y="28" width="900" height="10" fill="#e8e8e8"/>
  <circle cx="22" cy="19" r="6" fill="#fc5f57"/>
  <circle cx="42" cy="19" r="6" fill="#fdbd2e"/>
  <circle cx="62" cy="19" r="6" fill="#27c840"/>
  <!-- URL bar -->
  <rect x="120" y="8" width="500" height="22" rx="4" fill="#fff"/>
  <text x="370" y="23" text-anchor="middle" font-size="12" fill="#888" font-family="sans-serif">app.onepaywall.com/settings/domains</text>

  <!-- Main content area -->
  <rect x="24" y="58" width="852" height="396" rx="6" fill="#fff"/>

  <!-- Section heading -->
  <text x="48" y="94" font-size="18" font-weight="600" fill="#111" font-family="sans-serif">Domain Settings</text>
  <text x="48" y="116" font-size="13" fill="#888" font-family="sans-serif">Add your domain and copy the embed snippet to install on your site.</text>

  <!-- Domain row -->
  <rect x="48" y="132" width="520" height="44" rx="6" fill="#f9f9f9" stroke="#e5e5e5"/>
  <circle cx="74" cy="154" r="10" fill="#e0f4f4"/>
  <text x="94" y="149" font-size="13" font-weight="500" fill="#111" font-family="sans-serif">myblog.com</text>
  <text x="94" y="166" font-size="11" fill="#888" font-family="sans-serif">Site key: pk_live_a1b2c3d4e5f6</text>
  <rect x="460" y="142" width="88" height="26" rx="4" fill="#17a2a4"/>
  <text x="504" y="159" text-anchor="middle" font-size="12" fill="#fff" font-family="sans-serif">Verified ✓</text>

  <!-- Embed snippet box -->
  <rect x="48" y="196" width="800" height="220" rx="8" fill="#1e1e2e" stroke="#333"/>
  <rect x="48" y="196" width="800" height="34" rx="8" fill="#2a2a3e"/>
  <rect x="48" y="216" width="800" height="14" fill="#2a2a3e"/>
  <text x="68" y="218" font-size="12" fill="#888" font-family="sans-serif">Embed Snippet — paste inside your &lt;head&gt;</text>
  <rect x="768" y="204" width="64" height="22" rx="4" fill="#333"/>
  <text x="800" y="219" text-anchor="middle" font-size="11" fill="#ccc" font-family="sans-serif">Copy</text>

  <!-- Code lines -->
  <text x="68" y="254" font-size="12" fill="#7dd3fc">&lt;!-- OnePaywall --&gt;</text>
  <text x="68" y="274" font-size="12" fill="#f8f8f2">&lt;<tspan fill="#ff79c6">script</tspan></text>
  <text x="68" y="294" font-size="12" fill="#f8f8f2">  <tspan fill="#80deea">src</tspan>=<tspan fill="#f1fa8c">"https://cdn.onepaywall.com/embed.js"</tspan></text>
  <text x="68" y="314" font-size="12" fill="#f8f8f2">  <tspan fill="#80deea">data-site-key</tspan>=<tspan fill="#f1fa8c">"pk_live_a1b2c3d4e5f6"</tspan></text>
  <text x="68" y="334" font-size="12" fill="#f8f8f2">  <tspan fill="#80deea">async</tspan> <tspan fill="#80deea">defer</tspan></text>
  <text x="68" y="354" font-size="12" fill="#f8f8f2">&gt;&lt;/<tspan fill="#ff79c6">script</tspan>&gt;</text>

  <!-- Callout -->
  <rect x="48" y="430" width="420" height="14" rx="3" fill="#e0f4f4"/>
  <text x="58" y="441" font-size="11" fill="#17a2a4" font-family="sans-serif">✓  Snippet verified — signals are being received from myblog.com</text>
</svg>
