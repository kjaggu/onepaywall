  <rect width="900" height="460" rx="10" fill="#f5f5f5"/>
  <rect width="900" height="38" rx="10" fill="#e8e8e8"/>
  <rect y="28" width="900" height="10" fill="#e8e8e8"/>
  <circle cx="22" cy="19" r="6" fill="#fc5f57"/>
  <circle cx="42" cy="19" r="6" fill="#fdbd2e"/>
  <circle cx="62" cy="19" r="6" fill="#27c840"/>
  <rect x="120" y="8" width="500" height="22" rx="4" fill="#fff"/>
  <text x="370" y="23" text-anchor="middle" font-size="12" fill="#888">dashboard.razorpay.com/app/keys</text>

  <rect x="0" y="38" width="900" height="422" fill="#fff"/>

  <!-- Razorpay sidebar -->
  <rect x="0" y="38" width="220" height="422" fill="#0e3460" />
  <text x="110" y="78" text-anchor="middle" font-size="15" font-weight="700" fill="#fff">razorpay</text>

  <text x="30" y="114" font-size="11" fill="#8ca8c8">SETTINGS</text>
  <rect x="16" y="122" width="188" height="28" rx="4" fill="#1a4a7a"/>
  <text x="30" y="140" font-size="12" fill="#fff">API Keys</text>
  <text x="30" y="170" font-size="12" fill="#8ca8c8">Webhooks</text>
  <text x="30" y="195" font-size="12" fill="#8ca8c8">Team</text>
